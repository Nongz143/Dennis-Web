<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap"

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-200">

    <header class="fixed top-0 w-full bg-white dark:bg-gray-800 shadow z-50">
        <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">

            <h1 class="text-xl font-bold text-blue-900 dark:text-blue-300">Dennis Felicia</h1>

            <button id="hamburger" class="md:hidden text-3xl focus:outline-none">
                ☰
            </button>

            <ul id="nav-menu" class="hidden md:flex space-x-6 text-sm font-semibold">

                <li><a href="index.html" class="hover:text-blue-700 dark:hover:text-blue-400">Home</a></li>
                <li><a href="about.html" class="hover:text-blue-700 dark:hover:text-blue-400">About</a></li>
                <li><a href="education.html" class="hover:text-blue-700 dark:hover:text-blue-400">Education</a></li>
                <li><a href="Page2.html" class="hover:text-blue-700 dark:hover:text-blue-400">Courses</a></li>
                <li><a href="Page3.html" class="hover:text-blue-700 dark:hover:text-blue-400">Contact</a></li>
                <li><a href="snapshot.html" class="hover:text-blue-700 dark:hover:text-blue-400">Documentation</a></li>

                <li class="relative group">
                    <button class="hover:text-blue-700 dark:hover:text-blue-400">
                        More ▼
                    </button>

                    <ul
                        class="absolute left-0 mt-2 bg-white dark:bg-gray-800 shadow rounded hidden group-hover:block p-2 space-y-2 w-40">
                        <li><a href="blog.html" class="block hover:text-blue-700 dark:hover:text-blue-400">Blog</a></li>
                        <li><a href="gallery.html"
                                class="block hover:text-blue-700 dark:hover:text-blue-400">Gallery</a></li>
                        <li><a href="projects.html"
                                class="block hover:text-blue-700 dark:hover:text-blue-400">Projects</a></li>
                    </ul>
                </li>

            </ul>

            <button id="darkModeToggle"
                class="text-2xl p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                <i id="themeIcon" class="fas fa-moon text-gray-800 dark:text-gray-200"></i>
            </button>

        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-8 pt-28" data-aos="fade-up">

        <h2 class="text-4xl font-bold mb-6 text-blue-900 dark:text-blue-300">Contact Me</h2>

        <form class="space-y-6 bg-gray-100 dark:bg-gray-800 p-6 rounded shadow-lg" data-aos="fade-up"
            data-aos-delay="150">

            <div>
                <label for="name" class="block font-semibold mb-1">Name</label>
                <input type="text" id="name"
                    class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div>
                <label for="email" class="block font-semibold mb-1">Email</label>
                <input type="email" id="email"
                    class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div>
                <label for="message" class="block font-semibold mb-1">Message</label>
                <textarea id="message" rows="4"
                    class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <button type="submit" class="bg-blue-900 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
                Send
            </button>

        </form>

    </main>

    <footer class="bg-gray-900 text-gray-300 py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <img src="https://cdn.wallpapersafari.com/46/51/01wsum.jpg" alt="Golf Image"
                class="mx-auto w-full max-w-3xl rounded shadow mb-6" />

            <ul class="space-y-1">
                <li class="font-semibold">Dennis L. Felicia • 26 January</li>
                <li>&copy; 2026 Dennis Felicia</li>
            </ul>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
