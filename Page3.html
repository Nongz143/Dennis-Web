<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Dennis Felicia</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>

<body class="bg-white text-gray-800">
    <header class="bg-white shadow">
        <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
            <h1 class="text-xl font-bold text-blue-900">Dennis Felicia</h1>
            <ul class="flex space-x-6 text-sm font-semibold">
                <li><a href="index.html" class="hover:text-blue-700">Home</a></li>
                <li><a href="about.html" class="hover:text-blue-700">About</a></li>
                <li><a href="Page2.html" class="hover:text-blue-700">Courses</a></li>
                <li><a href="snapshot.html" class="hover:text-blue-700">Documentation</a></li>
            </ul>
            <button id="darkModeToggle"
                class="px-3 py-1 rounded bg-gray-200 text-gray-800 hover:bg-gray-300 transition">
                Dark Mode
            </button>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-8">
        <h2 class="text-3xl font-bold mb-6">Contact Me</h2>
        <form class="space-y-4">
            <div>
                <label for="name" class="block font-semibold">Name</label>
                <input type="text" id="name" class="w-full border px-4 py-2 rounded" />
            </div>
            <div>
                <label for="email" class="block font-semibold">Email</label>
                <input type="email" id="email" class="w-full border px-4 py-2 rounded" />
            </div>
            <div>
                <label for="message" class="block font-semibold">Message</label>
                <textarea id="message" rows="4" class="w-full border px-4 py-2 rounded"></textarea>
            </div>
            <button type="submit" class="bg-blue-900 text-white px-6 py-2 rounded hover:bg-blue-700">Send</button>
        </form>
    </main>
</body>

</html>
